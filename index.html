<!DOCTYPE html>
<html>
<head>
  <title>BFHL API Tester</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      margin-bottom: 10px;
    }

    textarea {
      width: 80%;
      height: 120px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background: #22c55e;
      color: black;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    pre {
      text-align: left;
      background: #1e293b;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
      overflow-x: auto;
      width: 80%;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>

<body>

  <h1>BFHL API Tester 🚀</h1>
  <p>Enter edges as JSON array</p>

  <textarea id="input">
["A->B","A->C","B->D","X->Y","Y->X","G->H","G->H","hello"]
  </textarea>

  <br>
  <button onclick="send()">Run API</button>

  <pre id="output">Output will appear here...</pre>

  <script>
    async function send() {
      try {
        const data = JSON.parse(document.getElementById("input").value);

        const response = await fetch("https://bajaj-finserv-api-1-mo1p.onrender.com/bfhl", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ data })
        });

        const result = await response.json();

        document.getElementById("output").innerText =
          JSON.stringify(result, null, 2);

      } catch (err) {
        document.getElementById("output").innerText =
          "Error: " + err.message;
      }
    }
  </script>

</body>
</html>
